<!DOCTYPE html>
<html>
<head>
<title>Weather App</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:350px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

#weather{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>🌦️ Weather App</h2>

<input id="city" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>

<div id="weather"></div>

</div>

<script>

async function getWeather(){

let city = document.getElementById("city").value

if(city === "") return

try{

let apiKey = "YOUR_API_KEY"
let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`

let response = await fetch(url)
let data = await response.json()

if(data.cod !== 200){
document.getElementById("weather").innerText = "City not found ❌"
return
}

document.getElementById("weather").innerHTML = `
<h3>${data.name}</h3>
<p>🌡️ Temp: ${data.main.temp} °C</p>
<p>☁️ ${data.weather[0].main}</p>
`

}
catch(error){
document.getElementById("weather").innerText = "Error fetching data"
}

}

</script>

</body>
</html>
